{{- range $component := list "api" "web" "jobs" }}
{{- $cfg := (index $.Values $component).config }}
{{- if $cfg.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $cfg.name }}
  {{- include "ttx.namespace" $ | nindent 2 }}
  labels:
    {{- include "ttx.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
type: Opaque
stringData:
  {{- toYaml $cfg.stringData | nindent 2 }}
{{- end }}
{{- end }}
