nameOverride: ""
fullnameOverride: ""

namespace: ttx

imagePullSecrets:
  - name: ttx-regcreds

api:
  config:
    create: true
    name: ttx-api-config
    stringData:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/ttx"
      BIND_ADDR: "0.0.0.0:3000"
      APP_ENV: "production"
      RUST_LOG: "info"
      JWT_KEY: ""
      JWT_ISSUER: "api.ttx.gg"
      JWT_AUDIENCE: "ttx.gg"
      JWT_EXPIRES_DAYS: "7"
      REDIS_URL: "redis://redis:6379"
      TWITCH_CLIENT_ID: ""
      TWITCH_CLIENT_SECRET: ""
      TWITCH_REDIRECT_URI: "https://api.ttx.gg/sessions/twitch/callback"
  image:
    repository: codeberg.org/ttx/ttx.api
    tag: main
    pullPolicy: Always
  containerPort: 3000
  service:
    port: 3030
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 128Mi
      cpu: 500m
  env: []
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10

web:
  config:
    create: true
    name: ttx-web-config
    stringData:
      FRESH_PUBLIC_API_BASE_URL: "https://api.ttx.gg"
      FRESH_PUBLIC_DISCORD_URL: "https://discord.gg/DEn7sAcDE6"
  image:
    repository: codeberg.org/ttx/ttx.web
    tag: main
    pullPolicy: Always
  containerPort: 8000
  service:
    port: 3031
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 128Mi
      cpu: 500m
  env: []
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75
  readinessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 15
    periodSeconds: 10

jobs:
  enabled: true
  run: []
  config:
    create: true
    name: ttx-jobs-config
    stringData:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/ttx"
      RUST_LOG: "info"
      TWITCH_CLIENT_ID: ""
      TWITCH_CLIENT_SECRET: ""
      TWITCH_REDIRECT_URI: "https://api.ttx.gg/sessions/twitch/callback"
      REDIS_URL: "redis://redis:6379"
      CREATOR_VALUES_DELAY_SECS: "15"
  image:
    repository: codeberg.org/ttx/ttx.jobs
    tag: main
    pullPolicy: Always
  replicas: 1
  env: []
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

redis:
  enabled: true
  image:
    repository: docker.io/redis
    tag: "7.4"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m
  persistence:
    claimName: redis-data
    accessModes:
      - ReadWriteOnce
    storage: 5Gi

ingress:
  enabled: true
  className: ""
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  tls:
    - hosts:
        - api.ttx.gg
        - ttx.gg
      secretName: ttx-tls
  hosts:
    - host: api.ttx.gg
      paths:
        - path: /
          pathType: Prefix
          service: ttx-api
          port: 3030
    - host: ttx.gg
      paths:
        - path: /
          pathType: Prefix
          service: ttx-web
          port: 3031
