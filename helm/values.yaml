# Default values for ttx (Rust port).
# This is a YAML-formatted file.

# Overrides for the chart name. ttx.name is used as the prefix for component
# resource names (e.g. "ttx-api", "ttx-web", "ttx-jobs").
nameOverride: ""
fullnameOverride: ""

# Namespace applied to all resources. Set to "" to let Helm/`--namespace`
# decide the namespace instead.
namespace: ttx

# Pull secret used for the private container images.
imagePullSecrets:
  - name: ttx-regcreds

# ttx-config secret, shared by api/web/jobs via envFrom.
#
# The Rust port reads flat environment variables (not the .NET `TTX__...`
# hierarchy). Override the empty values per-environment (e.g. with
# `-f secrets.yaml` or --set).
config:
  create: true
  name: ttx-config
  stringData:
    # Postgres connection string in URL form (sqlx). Points at an external
    # Postgres/TimescaleDB; migrations run automatically on startup.
    DATABASE_URL: "postgres://postgres:postgres@postgres:5432/ttx"
    # Optional shared L2 cache. Shared by the API (warm cache across replicas)
    # and required by the jobs runner's CreatorValueMonitorJob.
    REDIS_URL: "redis://redis:6379"
    # Deployment environment. "production" makes a missing JWT_KEY fatal.
    APP_ENV: "production"
    # tracing-subscriber EnvFilter directive.
    RUST_LOG: "info"
    # Session JWT signing secret. REQUIRED in production — override before deploy.
    JWT_KEY: ""
    JWT_ISSUER: "api.ttx.gg"
    JWT_AUDIENCE: "ttx.gg"
    JWT_EXPIRES_DAYS: "7"
    # Twitch OAuth app credentials (login flow + Helix stream polling).
    TWITCH_CLIENT_ID: ""
    TWITCH_CLIENT_SECRET: ""
    TWITCH_REDIRECT_URI: "https://api.ttx.gg/sessions/twitch/callback"

# ---------------------------------------------------------------------------
# API (Rust / axum)
# ---------------------------------------------------------------------------
api:
  image:
    repository: codeberg.org/ttx/ttx.api
    tag: main
    pullPolicy: Always
  # The Rust binary binds 0.0.0.0:3000 by default (BIND_ADDR).
  containerPort: 3000
  service:
    port: 3030
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 128Mi
      cpu: 500m
  env: []
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10

# ---------------------------------------------------------------------------
# Web (Deno frontend — unchanged by the Rust port, deployed alongside the API)
# ---------------------------------------------------------------------------
web:
  image:
    repository: codeberg.org/ttx/ttx.web
    tag: main
    pullPolicy: Always
  containerPort: 8000
  service:
    port: 3031
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 128Mi
      cpu: 500m
  env: []
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75
  readinessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
  livenessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 15
    periodSeconds: 10

# ---------------------------------------------------------------------------
# Background jobs (Rust / single binary).
#
# Unlike the .NET deployment (one Deployment per worker), the Rust `jobs`
# binary runs every job for which its integration is configured, in one
# process:
#   * CalculatePlayerPortfolioJob — always (DB only).
#   * StreamMonitorJob            — when TWITCH_CLIENT_ID/SECRET are set.
#   * CreatorValueMonitorJob      — when REDIS_URL is set.
# All three are configured via the shared ttx-config secret, so a single
# Deployment runs the full set.
# ---------------------------------------------------------------------------
jobs:
  enabled: true
  image:
    repository: codeberg.org/ttx/ttx.jobs
    tag: main
    pullPolicy: Always
  replicas: 1
  env: []
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

# ---------------------------------------------------------------------------
# Redis (in-cluster). The service is named "redis" to match REDIS_URL in the
# config secret.
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: docker.io/redis
    tag: "7.4"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m
  persistence:
    claimName: redis-data
    accessModes:
      - ReadWriteOnce
    storage: 5Gi

# ---------------------------------------------------------------------------
# Ingress (Traefik)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: ""
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  tls:
    - hosts:
        - api.ttx.gg
        - ttx.gg
      secretName: ttx-tls
  hosts:
    - host: api.ttx.gg
      paths:
        - path: /
          pathType: Prefix
          service: ttx-api
          port: 3030
    - host: ttx.gg
      paths:
        - path: /
          pathType: Prefix
          service: ttx-web
          port: 3031
