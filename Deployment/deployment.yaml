---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttx-api
  namespace: ttx
spec:
  selector:
    matchLabels:
      app: ttx-api
  template:
    metadata:
      labels:
        app: ttx-api
    spec:
      volumes:
        - name: ttx-dataprotection
          persistentVolumeClaim:
            claimName: ttx-dataprotection
      imagePullSecrets:
        - name: ttx-regcreds
      containers:
        - name: api
          image: ghcr.io/ttxdev/ttx.api:main
          imagePullPolicy: Always
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "250Mi"
              cpu: "500m"
          ports:
            - containerPort: 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: API
          envFrom:
            - secretRef:
                name: ttx-config
          volumeMounts:
            - name: ttx-dataprotection
              mountPath: /var/ttx/keys
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttx-job-streams
  namespace: ttx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ttx-job-streams
  template:
    metadata:
      labels:
        app: ttx-job-streams
    spec:
      imagePullSecrets:
        - name: ttx-regcreds
      containers:
        - name: streams
          image: ghcr.io/ttxdev/ttx.private:main
          imagePullPolicy: Always
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          envFrom:
            - secretRef:
                name: ttx-config
          env:
            - name: OTEL_SERVICE_NAME
              value: StreamMonitorJob
            - name: TTX__Jobs__Enabled__0
              value: StreamMonitorJob

